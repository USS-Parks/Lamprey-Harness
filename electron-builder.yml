appId: com.lamprey.harness
productName: Lamprey
copyright: Copyright © 2026 Basho Parks

afterPack: scripts/embed-win-icon.js

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json
  # Production deps (openai, @modelcontextprotocol/sdk, better-sqlite3, chokidar,
  # gray-matter, pdf-parse, @babel/standalone) are externalized by
  # electron-vite's externalizeDepsPlugin and require()d at runtime, so
  # node_modules must NOT be excluded. electron-builder smart-includes
  # only the production dependencies declared in package.json.

asarUnpack:
  - "**/*.node"

extraResources:
  - from: resources/vendor
    to: vendor
  - from: resources/skills
    to: skills
  # Track 2 / C4 — bundled slash commands. The slash-command loader
  # bootstraps `userData/slash-commands/` from process.resourcesPath/slash-commands
  # on first run, then hot-reloads from the userData dir.
  - from: resources/slash-commands
    to: slash-commands
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/splash.png
    to: splash.png
  # Bundled MCP servers (Node REPL today). mcp-defaults.ts resolves
  # process.resourcesPath/mcp/<server>/server.js at runtime in production.
  - from: resources/mcp
    to: mcp
  # Snip Phase K3+K10: bundled YAML filters. filter-loader.ts bootstraps
  # userData/snip/filters/built-in/ from process.resourcesPath/snip-filters
  # on first launch; subsequent launches hot-reload from userData.
  - from: resources/snip-filters
    to: snip-filters
  # Customize C6: starter connector catalog. Mirrors the typed
  # `src/data/connectors-catalog.ts` shipped to the renderer so the
  # main-process / installers ship the same data.
  - from: resources/connectors
    to: connectors
  # Customize C7: bundled plugins. plugin-loader.ts copies missing
  # entries from process.resourcesPath/plugins into userData/plugins/
  # on first launch; subsequent launches read userData only.
  - from: resources/plugins
    to: plugins

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.png
  target:
    - dmg
  artifactName: ${productName}-${arch}.${ext}
  hardenedRuntime: false

win:
  icon: resources/icon.ico
  target:
    - nsis
    - zip
  # Generic artifact names so cdn.islandmountain.io/Lamprey-x64.{exe,zip}
  # stays a stable URL across releases. The version lives in the GitHub
  # release tag + notes; the binary filename does not carry it. See
  # `feedback_cdn_evergreen_artifacts`.
  artifactName: ${productName}-${arch}.${ext}
  # JM-20 (SEC-6) — code signing. Unsigned auto-updates rest their integrity
  # SOLELY on the sha512 in latest.yml served from the update host: anyone who
  # can alter that manifest (or defeat TLS to it) can push a trojaned,
  # auto-installed update. Real fix is a publisher signature. This is wired to
  # be env-gated so CI/local can sign WITHOUT committing a cert:
  #   - Set WIN_CSC_LINK (path or base64 of the .pfx) + WIN_CSC_KEY_PASSWORD.
  #   - electron-builder auto-detects those env vars and signs; the updater
  #     then verifies the publisher cert on every download.
  # DEFERRED (owner action): acquiring an Authenticode / EV cert is a purchase
  # + identity-verification step that cannot happen in this session. Until the
  # cert exists the env vars are unset and the build stays unsigned, exactly as
  # before — no behavior change, but the path is documented and ready.
  # When signed, flip signAndEditExecutable to true (or delete this line — the
  # winCodeSign symlink-extraction issue below only bites the UNSIGNED path).
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Lamprey
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  # No custom sidebar/header — NSIS expects 164x314 BMP for sidebar and
  # 150x57 for header. Until we ship pixel-correct bitmaps the default
  # NSIS modern UI renders sharper than a downscaled wide-aspect image.

linux:
  icon: resources/icon.png
  category: Development
  target:
    - AppImage
  artifactName: ${productName}-${arch}.${ext}

publish:
  provider: github
  owner: USS-Parks
  repo: lamprey
